<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class and ID Selectors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Odd elements share the 'odd-style' class -->
    <p class="odd-style">Number 1 - I'm a class!</p>

    <!-- Unique ID for Number 2 -->
    <div id="element-two">Number 2 - I'm one ID.</div>

    <!-- Number 3 gets BOTH classes separated by a space -->
    <p class="odd-style cool-style">Number 3 - I'm a class, but cooler!</p>

    <!-- Unique ID for Number 4 -->
    <div id="element-four">Number 4 - I'm another ID.</div>

    <!-- Odd element shares the 'odd-style' class -->
    <p class="odd-style">Number 5 - I'm a class!</p>
  </body>
</html>
